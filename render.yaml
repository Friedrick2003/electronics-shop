services:
  - type: web
    name: electronics-shop-backend
    env: node
    rootDir: server
    buildCommand: npm install && npx prisma generate
    startCommand: node app.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: electronics-shop-db
          property: connectionString

databases:
  - name: electronics-shop-db
    databaseName: singitronic
    user: singitronic_user
